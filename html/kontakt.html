    <main>

        <div class="jednostavan-okvir">
            <div class="okvir-za-formu">
                <h1>Kontaktirajte nas!</h1>
                <p>Obratite nam se s povjerenjem. Odgovoriti ćemo na sva Vaša pitanja, kritike i pohvale u najbržem mogućem roku!</p>
                
                <form action="">
                    <label for="unos-ime">Ime:</label>
                    <input type="text" id="unos-ime" placeholder="..."> <br>
                    
                    <label for="unos-prezime">Prezime:</label>
                    <input type="text" id="unos-prezime" placeholder="..."> <br>

                    <label for="unos-organizacija">Naziv organizacije:</label>
                    <input type="text" id="unos-organizacija" placeholder="-"> <br>
                    
                    <label for="unos-email">E-mail adresa:</label>
                    <input type="text" id="unos-email" placeholder="netko@mail.com"> <br>

                    <label for="unos-telefon">Broj telefona:</label>
                    <input type="text" id="unos-telefon" placeholder="+385 0000 000"> <br>
                    
                    <label for="odabir-razlog">Razlog poruke:</label>
                    <select name="odabir-razlog" id="odabir-razlog">
                        <option value="">Pitanje</option>
                        <option value="">Recenzija</option>
                        <option value="">Reklamacija</option>
                    </select> <br>
                    
                    <label for="odabir-posjedovanje-paketa">Posjedovanje proizvoda:</label>
                    <select name="odabir-posjedovanje-paketa" id="odabir-posjedovanje-paketa">
                        <option value="0">Ne posjedujem</option>
                        <option value="1">Posjedujem jedan HiPo proizvod</option>
                        <option value="2">Posjedujem više od jednog HiPo proizvoda</option>
                    </select> <br>

                    <div class="prazni-prostor"></div>

                    <label for="unos-naslov-poruke">Naslov poruke:</label>
                    <input type="text" id="unos-naslov-poruke" placeholder="..."> <br>

                    <label for="unos-sadrzaj-poruke">Sadržaj poruke:</label>
                    <textarea name="unos-sadrzaj-poruke" id="unos-sadrzaj-poruke"></textarea>

                    <input type="checkbox" id="odabir-obavijesti">
                    <label for="odabir-obavijesti" class="opis-odabira">Želim dobivati obavijesti na e-mail</label>

                    <input type="submit" value="Pošalji" class="zelena-tipka">
                </form>
        </div>
        <div>

        </div>
        </div>
