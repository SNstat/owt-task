			</ul>

	<main>
		<div class="jednostavanOkvir">
			<div id="okvirZaFormu">
				<h1>Kontaktirajte nas!</h1>
				<p>
					Obratite nam se s povjerenjem. Odgovoriti ćemo na sva Vaša pitanja, kritike i pohvale u najbržem
					mogućem roku!
				</p>

				<form action="https://spider.foi.hr/OWT/materijali/ispis_forme.php" method="POST">
					<label for="unosIme">Ime:</label>
					<input type="text" id="unosIme" name="Ime" placeholder="...">
					<br>

					<label for="unosPrezime">Prezime:</label>
					<input type="text" id="unosPrezime" name="Prezime" placeholder="...">
					<br>

					<label for="unosLozinka">Lozinka:</label>
					<input type="password" id="unosLozinka" name="Lozinka" placeholder="***">
					<br>

					<label for="unosWebStraniceOrganizacije">Web stranica organizacije:</label>
					<input type="url" id="unosWebStraniceOrganizacije" name="AdresaWebStranice" placeholder="hipo.hr">
					<br>

					<label for="unosEmail">E-mail adresa:</label>
					<input type="email" id="unosEmail" name="Email" placeholder="netko@mail.com">
					<br>

					<label for="unosTelefona">Broj telefona:</label>
					<input type="tel" id="unosTelefona" name="Telefon" placeholder="+385 0000 000">
					<br>

					<label for="unosDatuma">Današnji datum:</label>
					<input type="date" id="unosDatuma" name="DanasnjiDatum" value="2026-04-01">
					<br>

					<label for="unosZadovoljstvo">Zadovoljstvo:</label>
					<br>
					<input type="range" id="unosZadovoljstvo" name="Zadovoljstvo" min="1" max="5" value="3">
					<br>

					<label for="unosRazlog">Razlog poruke:</label>
					<select name="RazlogPoruke" id="unosRazlog">
						<option value="Pitanje">Pitanje</option>
						<option value="Recenzija">Recenzija</option>
						<option value="Reklamacija">Reklamacija</option>
					</select>
					<br>
					<br>

					<label for="unosNaslovPoruke">Naslov poruke:</label>
					<input type="text" id="unosNaslovPoruke" name="NaslovPoruke" placeholder="...">
					<br>

					<label for="unosSadrzajPoruke">Sadržaj poruke:</label>
					<textarea name="SadrzajPoruke" id="SadrzajPoruke"></textarea>

					<label for="unosDatoteke">Prenesite datoteku:</label>
					<input type="file" id="unosDatoteke" name="Datoteka">
					<br>

					<input type="checkbox" id="odabirObavijesti" name="IzabranaObavijest">
					<label for="odabirObavijesti">Želim dobivati obavijesti na e-mail</label>

					<input type="submit" value="Pošalji" class="zelenaTipka">
				</form>
			</div>
			<div></div>
		</div>
	</main>
	<footer>
