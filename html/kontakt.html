    <script src="../js/scosic24.js"></script>
  </head>
  <body class="struktura_stranice">
    <header>
      <nav>
        <ul>
          <li><a href="../index.html" class="naslov-stranice">HIPO</a></li>
          <li><a href="../index.html">Početna stranica</a></li>

        </ul>
      </nav>
    </header>
    <main>
      <div class="jednostavan-okvir">
        <div class="okvir-za-formu">
          <h1>Kontaktirajte nas!</h1>
          <p>
            Obratite nam se s povjerenjem. Odgovoriti ćemo na sva Vaša pitanja,
            kritike i pohvale u najbržem mogućem roku!
          </p>

          <form action="https://spider.foi.hr/OWT/materijali/ispis_forme.php" method="POST">
            <label for="unos-ime">Ime:</label>
            <input
              type="text"
              id="unos-ime"
              name="unos-ime"
              placeholder="..."
            />
            <br />

            <label for="unos-prezime">Prezime:</label>
            <input
              type="text"
              id="unos-prezime"
              name="unos-prezime"
              placeholder="..."
            />
            <br />

            <label for="unos-organizacija">Naziv organizacije:</label>
            <input
              type="text"
              id="unos-organizacija"
              name="unos-organizacija"
              placeholder="-"
            />
            <br />

            <label for="unos-email">E-mail adresa:</label>
            <input
              type="email"
              id="unos-email"
              name="unos-email"
              placeholder="netko@mail.com"
            />
            <br />

            <label for="unos-telefon">Broj telefona:</label>
            <input
              type="tel"
              id="unos-telefon"
              name="unos-telefon"
              placeholder="+385 0000 000"
            />
            <br />

            <label for="odabir-razlog">Razlog poruke:</label>
            <select name="odabir-razlog" id="odabir-razlog">
              <option value="Pitanje">Pitanje</option>
              <option value="Recenzija">Recenzija</option>
              <option value="Reklamacija">Reklamacija</option>
            </select>
            <br />

            <label for="odabir-posjedovanje-paketa"
              >Posjedovanje proizvoda:</label
            >
            <select
              name="odabir-posjedovanje-paketa"
              id="odabir-posjedovanje-paketa"
            >
              <option value="Ne posjedujem niti jedan HiPo proizvod">
                Ne posjedujem niti jedan HiPo proizvod
              </option>
              <option value="Posjedujem jedan HiPo proizvod">
                Posjedujem jedan HiPo proizvod
              </option>
              <option value="Posjedujem više od jednog HiPo proizvoda">
                Posjedujem više od jednog HiPo proizvoda
              </option>
            </select>
            <br />

            <div class="prazni-prostor"></div>

            <label for="unos-naslov-poruke">Naslov poruke:</label>
            <input
              type="text"
              id="unos-naslov-poruke"
              name="unos-naslov-poruke"
              placeholder="..."
            />
            <br />

            <label for="unos-sadrzaj-poruke">Sadržaj poruke:</label>
            <textarea
              name="unos-sadrzaj-poruke"
              id="unos-sadrzaj-poruke"
            ></textarea>

            <label for="datoteka">Prenesite datoteku:</label>
            <input type="file" id="datoteka" name="datoteka" /> <br />

            <input
              type="checkbox"
              id="odabir-obavijesti"
              name="odabir-obavijesti"
            />
            <label for="odabir-obavijesti" class="opis-odabira"
              >Želim dobivati obavijesti na e-mail</label
            >

            <input type="submit" value="Pošalji" class="zelena-tipka" />
          </form>
        </div>
        <div></div>
      </div>
    </main>
    <footer>
      <a href="#"
        ><img

          alt="Ikona CSS validatora"
      /></a>
    </footer>
  </body>
</html>
